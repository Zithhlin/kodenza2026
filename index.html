<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streets of Kolkata</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

h1{
    margin-top:30px;
}

.gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:30px;
}

.image-box{
    position:relative;
    width:300px;
    height:200px;
    overflow:hidden;
    border-radius:10px;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.4s;
    font-size:20px;
}

.image-box:hover img{
    transform:scale(1.1);
}

.image-box:hover .overlay{
    opacity:1;
}
</style>

</head>

<body>

<h1>Streets of Kolkata</h1>
<p>Explore the charm of Kolkata through its streets</p>

<div class="gallery">

<div class="image-box">
<img src="https://c.files.bbci.co.uk/a2d4/live/dff1ddf0-7fd0-11ef-92ad-ff508aa8bb8c.jpg">
<div class="overlay">Iconic Kolkata Tram</div>
</div>

<div class="image-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/18/Howrah_Bridge_at_night.jpg">
<div class="overlay">Howrah Bridge Lights</div>
</div>

<div class="image-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/72/India_DSC00921_%2816515522567%29.jpg">
<div class="overlay">Famous Street Food</div>
</div>

<div class="image-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Yellow_taxi_in_Kolkata.jpg">
<div class="overlay">Classic Yellow Taxi</div>
</div>

</div>

</body>
</html>
